apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: open-telemetry-instance-demo
  namespace: observability-demo
spec:
  image: otel/opentelemetry-collector-contrib:0.87.0
  ports:
    - name: jaeger
      port: 16686
  config:
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]

        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        send_batch_max_size: 10000
        timeout: 0s

    exporters:
      debug:
        verbosity: detailed # verbosity can be 'basic', 'normal', or 'detailed'
